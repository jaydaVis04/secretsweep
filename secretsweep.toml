[scan]
entropy_threshold = 4.5
min_secret_length = 20
exclude_paths = ["vendor/", "node_modules/", "*.lock", "*.sum", "__pycache__/", "build/", "dist/"]

[allowlist]
patterns = [
  "example\\.com",
  "placeholder_key"
]
files = [
  "tests/fixtures/fake_credentials.env"
]

[rules]
aws = true
github = true
slack = true
jwt = true
database_urls = true
private_keys = true
generic_api_keys = true
high_entropy = true
